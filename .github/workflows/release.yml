name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build-server:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ws002

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish Windows
      run: dotnet publish -c Release -r win-x64 --self-contained true -o ../artifacts/ws002-win-x64

    - name: Publish Linux
      run: dotnet publish -c Release -r linux-x64 --self-contained true -o ../artifacts/ws002-linux-x64

    - name: Upload server artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-artifacts
        path: artifacts/

  build-client:
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: Poscle35

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore NuGet packages
      run: nuget restore Poscle35.sln
    
    - name: Build
      run: msbuild Poscle35.sln /p:Configuration=Release /p:Platform="AnyCPU" /t:Build
    
    - name: Publish
      run: |
        mkdir -Force ..\artifacts\PushClient-win-x64
        Copy-Item -Path "bin\Release\*" -Destination "..\artifacts\PushClient-win-x64\" -Recurse -Force

    - name: Upload client artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-artifacts
        path: artifacts/

  release:
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download server artifacts
      uses: actions/download-artifact@v4
      with:
        name: server-artifacts
        path: artifacts/ws002

    - name: Download client artifacts
      uses: actions/download-artifact@v4
      with:
        name: client-artifacts
        path: artifacts/PushClient

    - name: Create ZIP for Windows server
      run: |
        cd artifacts
        powershell -Command "Compress-Archive -Path 'ws002-win-x64\*' -DestinationPath 'ws002-${{ github.ref_name }}-win-x64.zip' -Force"

    - name: Create ZIP for Linux server
      run: |
        cd artifacts
        powershell -Command "Compress-Archive -Path 'ws002-linux-x64\*' -DestinationPath 'ws002-${{ github.ref_name }}-linux-x64.zip' -Force"

    - name: Create ZIP for Windows client
      run: |
        cd artifacts
        powershell -Command "Compress-Archive -Path 'PushClient-win-x64\*' -DestinationPath 'PushClient-${{ github.ref_name }}-win-x64.zip' -Force"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/ws002-${{ github.ref_name }}-win-x64.zip
          artifacts/ws002-${{ github.ref_name }}-linux-x64.zip
          artifacts/PushClient-${{ github.ref_name }}-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}