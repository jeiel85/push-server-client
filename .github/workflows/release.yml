name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build-server:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ws002

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish Windows
      run: dotnet publish -c Release -r win-x64 --self-contained true -o ./publish/ws002-win-x64

    - name: Publish Linux
      run: dotnet publish -c Release -r linux-x64 --self-contained true -o ./publish/ws002-linux-x64

    - name: Upload server artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-artifacts
        path: ws002/publish/

  build-client:
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: Poscle35

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish
      run: dotnet publish -c Release -r win-x64 --self-contained true -o ./publish/PushClient-win-x64

    - name: Upload client artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-artifacts
        path: Poscle35/publish/

  release:
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download server artifacts
      uses: actions/download-artifact@v4
      with:
        name: server-artifacts
        path: release_artifacts/server

    - name: Download client artifacts
      uses: actions/download-artifact@v4
      with:
        name: client-artifacts
        path: release_artifacts/client

    - name: Create ZIP files
      run: |
        sudo apt-get update && sudo apt-get install -y zip
        cd release_artifacts/server
        zip -r ../../ws002-${{ github.ref_name }}-win-x64.zip ws002-win-x64
        zip -r ../../ws002-${{ github.ref_name }}-linux-x64.zip ws002-linux-x64
        cd ../client
        zip -r ../../PushClient-${{ github.ref_name }}-win-x64.zip PushClient-win-x64

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ws002-${{ github.ref_name }}-win-x64.zip
          ws002-${{ github.ref_name }}-linux-x64.zip
          PushClient-${{ github.ref_name }}-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}