name: Build Server

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
    paths:
      - 'ws002/**'
      - 'Poscle35/**'
      - '.github/workflows/server.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'ws002/**'
      - 'Poscle35/**'
      - '.github/workflows/server.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  PUBLISH_CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Server dependencies
      run: dotnet restore
      working-directory: ws002

    - name: Build Server
      run: dotnet build --configuration ${{ env.PUBLISH_CONFIGURATION }} --no-restore
      working-directory: ws002

    - name: Publish Server
      run: dotnet publish -c ${{ env.PUBLISH_CONFIGURATION }} -o ../publish/server --self-contained false
      working-directory: ws002

    - name: Create Server Release ZIP
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd publish/server
        zip -r ../ws002-${{ github.ref_name }}-linux-x64.zip .

    - name: Upload Server Artifact
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: ws002-linux
        path: ws002-${{ github.ref_name }}-linux-x64.zip
        retention-days: 30

  build-windows:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Server dependencies
      run: dotnet restore
      working-directory: ws002

    - name: Restore Client dependencies
      run: dotnet restore
      working-directory: Poscle35

    - name: Build Client
      run: dotnet publish -c ${{ env.PUBLISH_CONFIGURATION }} -o ../publish/client
      working-directory: Poscle35

    - name: Publish Server
      run: dotnet publish -c ${{ env.PUBLISH_CONFIGURATION }} -o ../publish/server
      working-directory: ws002

    - name: Create Server ZIP
      run: |
        Compress-Archive -Path publish/server/* -DestinationPath ws002-${{ github.ref_name }}-server-win-x64.zip -Force

    - name: Create Client ZIP
      run: |
        Compress-Archive -Path publish/client/* -DestinationPath PushClient-${{ github.ref_name }}-win-x64.zip -Force

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ws002-windows
        path: ws002-${{ github.ref_name }}-server-win-x64.zip
        retention-days: 30

    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pushclient-windows
        path: PushClient-${{ github.ref_name }}-win-x64.zip
        retention-days: 30

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: ws002-linux
        path: ./artifacts

    - name: Download Windows Server Artifact
      uses: actions/download-artifact@v4
      with:
        name: ws002-windows
        path: ./artifacts

    - name: Download Windows Client Artifact
      uses: actions/download-artifact@v4
      with:
        name: pushclient-windows
        path: ./artifacts

    - name: List Artifacts
      run: ls -la artifacts/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        generate_release_notes: false
        files: |
          artifacts/ws002-${{ github.ref_name }}-linux-x64.zip
          artifacts/ws002-${{ github.ref_name }}-server-win-x64.zip
          artifacts/PushClient-${{ github.ref_name }}-win-x64.zip
        overwrite_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}
