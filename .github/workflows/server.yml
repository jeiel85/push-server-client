name: Build Server

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
    paths:
      - 'ws002/**'
      - '.github/workflows/server.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'ws002/**'
      - '.github/workflows/server.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  PUBLISH_CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ws002

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration ${{ env.PUBLISH_CONFIGURATION }} --no-restore
    
    - name: Publish
      run: dotnet publish -c ${{ env.PUBLISH_CONFIGURATION }} -o ../publish --self-contained false
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-build
        path: publish/
        retention-days: 30
    
    - name: Create Release ZIP
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd ../publish
        zip -r ../ws002-${{ github.ref_name }}-linux-x64.zip .
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ws002-${{ github.ref_name }}-linux-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    defaults:
      run:
        working-directory: ws002
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Publish
      run: dotnet publish -c ${{ env.PUBLISH_CONFIGURATION }} -o ../publish
    
    - name: Create Release ZIP
      run: |
        Compress-Archive -Path "publish\*" -DestinationPath "ws002-${{ github.ref_name }}-win-x64.zip" -Force
    
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        files: |
          ws002-${{ github.ref_name }}-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
