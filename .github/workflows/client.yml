name: Build Client

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
    paths:
      - 'Poscle35/**'
      - '.github/workflows/client.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'Poscle35/**'
      - '.github/workflows/client.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: Poscle35

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Publish
      run: |
        dotnet publish Poscle35.csproj -c Release -r win-x64 --self-contained false -o ..\artifacts\PushClient-win-x64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-artifacts
        path: artifacts/
