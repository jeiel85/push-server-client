name: Build Client

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
    paths:
      - 'Poscle35/**'
      - '.github/workflows/client.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'Poscle35/**'
      - '.github/workflows/client.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: Poscle35

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore NuGet packages
      run: |
        nuget restore Poscle35.sln
    
    - name: Build
      run: |
        msbuild Poscle35.sln /p:Configuration=Release /p:Platform="AnyCPU" /t:Build
    
    - name: Publish
      run: |
        mkdir -Force ..\artifacts\PushClient-win-x64
        Copy-Item -Path "bin\Release\*" -Destination "..\artifacts\PushClient-win-x64\" -Recurse -Force

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-artifacts
        path: artifacts/
